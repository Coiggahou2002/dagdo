name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

      - run: bun run typecheck
      - run: bun test

      - name: Find merged PR and read label
        id: label
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const merged = commits.data.find(pr => pr.merged_at);
            if (!merged) {
              core.info('No merged PR found, skipping release');
              core.setOutput('bump_type', '');
              return;
            }
            const labels = merged.labels.map(l => l.name);
            const bump = labels.find(l => ['patch', 'minor', 'major'].includes(l));
            if (!bump) {
              core.info('No version label on PR #' + merged.number + ', skipping release');
              core.setOutput('bump_type', '');
              return;
            }
            core.info('PR #' + merged.number + ' has label: ' + bump);
            core.setOutput('bump_type', bump);

      - name: Bump version
        id: bump
        if: steps.label.outputs.bump_type != ''
        run: |
          # Pull latest main in case a previous release pushed ahead
          git pull --rebase origin main
          BUMP="${{ steps.label.outputs.bump_type }}"
          NEW_VERSION=$(npm version "$BUMP" --no-git-tag-version | tr -d 'v')
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION ($BUMP)"

      - name: Update CHANGELOG
        if: steps.label.outputs.bump_type != ''
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          DATE=$(date +%Y-%m-%d)
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md

      - name: Commit and tag
        if: steps.label.outputs.bump_type != ''
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "Release $VERSION"
          git tag "v$VERSION"
          git push
          git push origin "v$VERSION"

  build:
    needs: version
    if: needs.version.outputs.new_version != ''
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: dagdo-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: dagdo-darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.new_version }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: >
          bun build src/cli.ts --compile
          --target=${{ matrix.target }}
          --outfile ${{ matrix.artifact }}
          --external mermaid-isomorphic
          --external playwright
          --external @hpcc-js/wasm-graphviz
          --external @resvg/resvg-js
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: chmod +x artifacts/*
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          files: artifacts/*
          generate_release_notes: true

  publish:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.new_version }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: bun install
      - run: bun run build:web
      - run: bun run build:node
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
