name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Check CHANGELOG has entry for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -qE "## \[?$VERSION\]?" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for version $VERSION. Add a '## [$VERSION]' section before releasing."
            exit 1
          fi
      - name: Check package.json version matches tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::warning::package.json version ($PKG_VERSION) does not match tag ($VERSION). Remember to bump package.json before tagging."
          fi
      - run: bun run typecheck
      - run: bun test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: dagdo-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: dagdo-darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
      - run: >
          bun build src/cli.ts --compile
          --target=${{ matrix.target }}
          --outfile ${{ matrix.artifact }}
          --external mermaid-isomorphic
          --external playwright
          --external @hpcc-js/wasm-graphviz
          --external @resvg/resvg-js
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: chmod +x artifacts/*
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
      - run: npm install --ignore-scripts
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
